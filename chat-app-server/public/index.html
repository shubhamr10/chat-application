    <meta charset="UTF-8">

    <title>Socket io base code</title>
    <style>
      body { margin: 0; padding-bottom: 3rem; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

      #form { background: rgba(0, 0, 0, 0.15); padding: 0.25rem; position: fixed; bottom: 0; left: 0; right: 0; display: flex; height: 3rem; box-sizing: border-box; backdrop-filter: blur(10px); }
      #input { border: none; padding: 0 1rem; flex-grow: 1; border-radius: 2rem; margin: 0.25rem; }
      #input:focus { outline: none; }
      #userNameBorder > button ,#form > button { background: #333; border: none; padding: 0 1rem; margin: 0.25rem; border-radius: 3px; outline: none; color: #fff; }

      #username{ border: none; padding: 0 1rem; flex-grow: 1; border-radius: 2rem; margin: 0.25rem; }
      #userNameBorder { background: rgba(0, 0, 0, 0.15); padding: 0.25rem; position: sticky; top:0; left: 0; right: 0; display: flex; height: 3rem; box-sizing: border-box; backdrop-filter: blur(10px); }

      #messages { list-style-type: none; margin: 0; padding: 0; }
      #messages > li { padding: 0.5rem 1rem; }
      #messages > li:nth-child(odd) { background: #efefef; }
    </style>
</head>
<body>
    <form id="userNameBorder" action="">
      <input type="text" id="username" autocomplete="off"/> <button>Update</button>
    </form>
    <ul id="messages"></ul>
    <form id="form" action="">
      <input id="input" autocomplete="off" /><button>Send</button>
    </form>
    
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js" integrity="sha384-kzavj5fiMwLKzzD1f8S7TeoVIEi7uKHvbTA3ueZkrzYq75pNQUiUi6Dy98Q3fxb0" crossorigin="anonymous"></script>
    <script>
          const socket = io();
          const nickname = window.prompt("Enter a nickname.");

          socket.on("connect", ()=> {
            console.log("Connected to server! ID: ", socket.id);
          });

          // if the nickname is available, set the nickname.
          if(nickname){
            document.getElementById("username").value = nickname;
            socket.emit("set nickname", nickname);
          }


          // attach the chat html block
          const form = document.getElementById("form");
          const inputText = document.getElementById("input");

          form.addEventListener("submit", (e) => {
            e.preventDefault();
            const message = inputText.value;
            if(message != ""){
              socket.emit("chat message",message);
            }
          });

          input.addEventListener("input", () => {
            socket.emit("typing");
            clearTimeout(typingTimer);
            // stop timer
            typingTimer = setTimeout(()=> {}, 1500);
          });

        socket.on("chat message", (msgObj)=> {
          const messagesList = document.getElementById("messages");
          const username = Object.keys(msgObj)[0];
          const message = Object.values(msgObj)[0];

          const item = document.createElement("li");
          item.textContent = message;
          messagesList.appendChild(item);
          window.scrollTo(0, document.body.scrollHeight);
        });

        socket.on("typing", (data) => {
          
        })

        socket.on("stop typing", (data) => {
          
        });
